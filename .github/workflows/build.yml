name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build release APK (R8/minify enabled)
        run: ./gradlew assembleRelease --stacktrace

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest

      - name: Verify APK is minified (R8)
        run: |
          set -e
          APK_DIR="app/build/outputs/apk/release"
          if [ ! -d "$APK_DIR" ]; then
            echo "ERROR: Release APK output directory not found: $APK_DIR"
            exit 1
          fi
          APK=$(find "$APK_DIR" -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No release APK produced"
            exit 1
          fi
          echo "Found release APK: $APK"
          unzip -l "$APK" | grep -E "classes\.dex|classes2\.dex" || true
          SIZE=$(stat -c%s "$APK")
          echo "APK size: $SIZE bytes"
          echo "R8/minify is enabled in buildTypes.release (minifyEnabled true)"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload mapping file
        uses: actions/upload-artifact@v4
        with:
          name: release-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/
          if-no-files-found: warn
